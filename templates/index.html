{% extends "base.html" %}

{% block content %}
<div class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">股票策略回測系統</h1>
        <p class="lead">保留三年前的核心邏輯，用更現代的形式呈現數據之美。</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="card-title text-center mb-4">查詢股票數據</h3>
                <form id="stockForm" action="/" method="POST">
                    <div class="mb-3">
                        <label for="stockNo" class="form-label">股票代號</label>
                        <input type="text" class="form-control" id="stockNo" name="stockNo" placeholder="例如: 2330"
                            required>
                        <div class="form-text">系統將從台灣證券交易所自動抓取資料。</div>
                    </div>

                    <div class="row mb-4">
                        <div class="col">
                            <label for="startDate" class="form-label">開始日期 (YYYYMMDD)</label>
                            <input type="text" class="form-control" id="startDate" name="startDate"
                                placeholder="20220101" required>
                        </div>
                        <div class="col">
                            <label for="endDate" class="form-label">結束日期 (YYYYMMDD)</label>
                            <input type="text" class="form-control" id="endDate" name="endDate" placeholder="20220601"
                                required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">開始抓取與分析</button>
                    </div>
                </form>
                <script>
                    document.getElementById('stockForm').onsubmit = function () {
                        document.getElementById('loadingOverlay').style.display = 'flex';
                    };
                </script>
                {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
