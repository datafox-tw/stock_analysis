<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis - 精進版</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8f9fa;
        }

        .hero-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 60px 0;
            margin-bottom: 30px;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: #1e3c72;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
        }

        .btn-primary:hover {
            background-color: #2a5298;
        }

        .nav-link.active {
            font-weight: bold;
            border-bottom: 3px solid #1e3c72;
        }

        .footer {
            padding: 30px 0;
            color: #6c757d;
            font-size: 0.9rem;
        }

        /* Loading Overlay */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: #1e3c72;
        }
    </style>
</head>

<body>
    <div id="loadingOverlay">
        <div class="spinner-border mb-3" role="status"></div>
        <h4 class="fw-bold text-dark">正在從證交所抓取資料...</h4>
        <p class="text-muted">這可能需要幾秒到一分鐘，請稍候。</p>
        <div id="downloadStatus" class="fw-bold text-primary"></div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="/">📈 StockAnalysis Pro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-item nav-link" href="/">首頁</a>
                <a class="nav-item nav-link" href="/reset">清除快取</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="container text-center footer">
        <hr>
        <p>© 2026 Stock Analysis Project. 保留核心邏輯精髓，追求極致形式升級。</p>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
